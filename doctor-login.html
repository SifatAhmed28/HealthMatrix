<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            color: #007bff;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Doctor Login</h1>
        <form id="doctorLoginForm">
            <label for="doctor-email">Email:</label>
            <input type="email" id="doctor-email" name="doctor-email" required>

            <label for="doctor-password">Password:</label>
            <input type="password" id="doctor-password" name="doctor-password" required>

            <button type="submit">Login</button>
        </form>
    </div>

    <script>
        document.getElementById("doctorLoginForm").addEventListener("submit", function (event) {
            event.preventDefault();
            const email = document.getElementById("doctor-email").value;
            const password = document.getElementById("doctor-password").value;

            if (email === "doctor@example.com" && password === "password123") {
                alert("Login successful!");
                window.location.href = "index.html"; // Redirect to Home Page
            } else {
                alert("Invalid email or password. Please try again.");
            }
        });
    </script>
</body>
</html>
